<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/buili_favicon_transparent.png" />
    <title>Buili</title>
    <style>
      :root {
        --ink: #2f2f2c;
        --muted: #6f736f;
        --line: #deded9;
        --paper: #ffffff;
        --concrete: #f4f4f1;
        --signal: #218a48;
        --warn: #c98222;
        --danger: #cf4d3f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
      }
      button, input, select, textarea {
        font: inherit;
        color: inherit;
      }
      button {
        border: 1px solid #bdbdb8;
        background: #fff;
        min-height: 38px;
        padding: 8px 13px;
        cursor: pointer;
      }
      button.primary {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      button.approve { border-color: #98c7a4; color: var(--signal); }
      button.reject { border-color: #e3b1aa; color: var(--danger); }
      .shell {
        display: grid;
        grid-template-columns: 212px minmax(0, 1fr);
        min-height: 100vh;
      }
      .side {
        border-right: 1px solid var(--line);
        padding: 28px 14px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 0;
        padding: 0 10px 28px;
        background: transparent;
        font-weight: 800;
      }
      .brand img { width: 24px; height: 24px; }
      .nav button {
        width: 100%;
        border: 0;
        border-left: 2px solid transparent;
        background: transparent;
        text-align: left;
        margin: 4px 0;
      }
      .nav button.active {
        border-left-color: var(--signal);
        font-weight: 800;
      }
      .workbench {
        padding: 28px 34px 80px;
        max-width: 1240px;
      }
      .top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .eyebrow {
        color: var(--signal);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .18em;
        font-weight: 800;
        margin: 0 0 6px;
      }
      h1 {
        font-size: 40px;
        line-height: 1;
        margin: 0 0 10px;
      }
      h2 {
        font-size: 19px;
        margin: 0;
      }
      h3 {
        font-size: 17px;
        margin: 0 0 8px;
      }
      p { line-height: 1.48; }
      .subtle { color: var(--muted); }
      .top-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .project-strip {
        display: grid;
        grid-template-columns: 280px minmax(180px, 1fr) minmax(160px, 1fr) auto auto;
        gap: 10px;
        align-items: center;
        margin: 26px 0;
      }
      .project-strip label {
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: .14em;
        font-weight: 800;
        color: var(--muted);
      }
      .project-select {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 10px;
      }
      select, input, textarea {
        width: 100%;
        border: 1px solid #bdbdb8;
        background: #fff;
        min-height: 38px;
        padding: 8px 10px;
      }
      .kpis {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        border: 1px solid var(--line);
        margin-bottom: 24px;
      }
      .kpi {
        padding: 14px 14px;
        border-right: 1px solid var(--line);
      }
      .kpi:last-child { border-right: 0; }
      .kpi span {
        display: block;
        color: var(--muted);
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: .1em;
        font-weight: 800;
      }
      .kpi strong {
        display: block;
        font-size: 23px;
        margin-top: 8px;
      }
      .notice {
        min-height: 22px;
        margin: -10px 0 16px;
        color: var(--signal);
        font-weight: 700;
      }
      .grid {
        display: grid;
        grid-template-columns: 360px minmax(520px, 1fr);
        gap: 0;
        border: 1px solid var(--line);
        box-shadow: 0 18px 50px rgba(47, 47, 44, .08);
      }
      #panelIssues .grid > section:first-child {
        border-right: 1px solid var(--line);
        max-height: 760px;
        overflow: auto;
      }
      #panelIssues .grid > section:first-child .section-row,
      #panelIssues .grid > section:first-child .tabs {
        padding-left: 22px;
        padding-right: 22px;
      }
      #panelIssues .grid > section:first-child .section-row {
        padding-top: 24px;
      }
      #panelIssues .grid > aside { display: none; }
      .section-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }
      .tabs button {
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: .1em;
        font-weight: 800;
      }
      .tabs .active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      .issue-group {
        margin-bottom: 28px;
      }
      .group-label {
        margin: 0 0 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .15em;
        font-size: 12px;
        font-weight: 800;
      }
      .issue-row {
        position: relative;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        width: 100%;
        border: 0;
        border-left: 3px solid var(--warn);
        background: #fff;
        text-align: left;
        padding: 13px 16px;
        margin-bottom: 10px;
      }
      .issue-row.selected {
        background: #edf6ef;
      }
      .issue-row.minor { border-left-color: #42a363; }
      .issue-row.informational { border-left-color: #777; }
      .issue-type {
        display: block;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .13em;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 5px;
      }
      .issue-row strong {
        display: block;
        font-size: 15px;
        line-height: 1.28;
      }
      .issue-row small {
        display: block;
        color: var(--muted);
        margin-top: 5px;
      }
      .confidence {
        font-size: 15px;
        font-weight: 800;
        padding-right: 24px;
      }
      .inspector-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        border-left: 3px solid #aaa;
        padding-left: 14px;
        margin-bottom: 16px;
      }
      .inspector-head h2 {
        font-size: 21px;
        line-height: 1.24;
      }
      .status {
        text-transform: uppercase;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: .11em;
        font-weight: 800;
        white-space: nowrap;
      }
      .detail {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: var(--concrete);
        margin: 18px 0;
      }
      .detail div {
        padding: 14px 12px;
        border-right: 1px solid var(--line);
      }
      .detail div:last-child { border-right: 0; }
      .detail span, .evidence-block span, .asset-list span {
        display: block;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .12em;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 6px;
      }
      .evidence-block {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 28px;
        margin: 22px 0;
      }
      .evidence-block p { margin: 0; font-size: 19px; }
      .evidence-block small { color: var(--muted); display: block; margin-top: 12px; }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 28px;
      }
      .plan-box img,
      .plan-canvas img,
      .field-stage img {
        width: 100%;
        display: block;
        border: 1px solid #bdbdb8;
      }
      .snapshot {
        background: var(--concrete);
        margin-top: 10px;
      }
      .snapshot div {
        display: flex;
        justify-content: space-between;
        padding: 11px 10px;
        border-bottom: 1px solid var(--line);
      }
      .snapshot div:last-child { border-bottom: 0; }
      .snapshot span {
        color: var(--muted);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: .1em;
        font-weight: 800;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }
      .two-col {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        gap: 32px;
      }
      .field-stage {
        position: relative;
      }
      .marker {
        position: absolute;
        left: 36%;
        top: 38%;
        width: 26%;
        height: 22%;
        border: 2px solid var(--signal);
      }
      .recognition-list article,
      .evidence-links div,
      .asset-list div,
      .tech article,
      .report-preview article,
      .rag-results article {
        border-left: 1px solid var(--line);
        padding: 13px 14px;
      }
      .recognition-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }
      .evidence-links {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }
      .asset-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }
      .rag-results {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }
      .plan-review {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        align-items: start;
      }
      .plan-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .plan-toolbar div {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .plan-toolbar button {
        min-width: 38px;
      }
      .zoom-readout {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .1em;
        font-weight: 800;
      }
      .plan-viewport {
        overflow: auto;
        border: 1px solid #bdbdb8;
        background: #fff;
        max-height: 74vh;
      }
      .plan-canvas {
        position: relative;
        max-width: none;
        transition: width .16s ease;
      }
      .plan-canvas img {
        border: 0;
      }
      .pin {
        position: absolute;
        width: 10px;
        height: 10px;
        min-height: 0;
        padding: 0;
        margin: -5px 0 0 -5px;
        background: var(--warn);
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px #777;
      }
      .pin.minor { background: var(--signal); }
      .pin.informational { background: #777; }
      .pin.active {
        width: 14px;
        height: 14px;
        margin: -7px 0 0 -7px;
        box-shadow: 0 0 0 2px var(--ink);
      }
      .plan-sidebar {
        display: grid;
        gap: 14px;
      }
      .plan-summary,
      .sheet-list,
      .pin-list,
      .region-list,
      .trace-detail {
        border-left: 1px solid var(--line);
        padding: 12px 14px;
      }
      .plan-summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        background: var(--concrete);
        border-left: 3px solid var(--signal);
      }
      .plan-summary span,
      .sheet-list span,
      .pin-list span,
      .region-list span,
      .trace-detail span {
        display: block;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .1em;
        font-size: 11px;
        font-weight: 800;
        margin-bottom: 5px;
      }
      .sheet-list div,
      .region-list div {
        display: grid;
        grid-template-columns: 72px 1fr auto;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--line);
      }
      .sheet-list div:last-child,
      .region-list div:last-child {
        border-bottom: 0;
      }
      .pin-list button {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        border: 0;
        border-left: 3px solid var(--warn);
        text-align: left;
        padding: 9px 11px;
        margin: 4px 0;
        min-height: 0;
      }
      .pin-list button.active {
        background: #edf6ef;
      }
      .pin-list button.minor { border-left-color: var(--signal); }
      .pin-list button.informational { border-left-color: #777; }
      .trace-detail p {
        margin: 6px 0 12px;
      }
      .report-preview {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-bottom: 18px;
      }
      .report-preview span,
      .recognition-list small,
      .evidence-links span,
      .tech span,
      .pipeline-events span {
        display: block;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .11em;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 6px;
      }
      .report-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .rfi-output {
        min-height: 260px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .pipeline-steps {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        border-top: 3px solid var(--signal);
        margin-bottom: 18px;
      }
      .pipeline-steps div {
        padding: 12px 10px;
        border-right: 1px solid var(--line);
      }
      .pipeline-steps div:last-child { border-right: 0; }
      .pipeline-steps span {
        display: block;
        color: var(--signal);
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .tech {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }
      .tech article.ready {
        border-top: 3px solid var(--signal);
      }
      .pipeline-events {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        background: var(--concrete);
        border: 1px solid var(--line);
        padding: 16px;
      }
      .pipeline-events div { padding: 8px 0; }
      .bottom {
        display: none;
      }
      .hidden { display: none !important; }
      .spatial-workspace {
        min-width: 0;
        background: #fff;
      }
      .model-stage {
        position: relative;
        min-height: 560px;
        overflow: hidden;
        background:
          radial-gradient(circle at 52% 24%, rgba(245, 248, 250, .96), rgba(255,255,255,0) 38%),
          linear-gradient(135deg, #f7f9fb 0%, #fff 48%, #eef2f4 100%);
      }
      .model-toolbar,
      .view-toggle,
      .floor-key,
      .mini-map-card {
        position: absolute;
        z-index: 5;
      }
      .model-toolbar {
        left: 20px;
        top: 16px;
        display: flex;
        box-shadow: 0 8px 24px rgba(35, 43, 52, .12);
      }
      .model-toolbar button {
        width: 46px;
        min-height: 46px;
        border: 0;
        border-right: 1px solid #e8edf1;
        background: rgba(255,255,255,.94);
        padding: 0;
      }
      .model-toolbar button.active {
        outline: 1.5px solid #2c87ff;
        outline-offset: -1.5px;
      }
      .view-toggle {
        right: 20px;
        top: 18px;
        display: flex;
        padding: 3px;
        background: rgba(255,255,255,.94);
        box-shadow: 0 8px 24px rgba(35, 43, 52, .12);
      }
      .view-toggle button {
        border: 0;
        min-height: 34px;
        background: transparent;
      }
      .view-toggle .active {
        background: #0b70df;
        color: #fff;
      }
      .model-image {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(1120px, 104%);
        height: min(720px, 98%);
        object-fit: contain;
        transform: translate(-50%, -48%);
      }
      .model-pin {
        position: absolute;
        z-index: 6;
        min-height: 0;
        border: 0;
        background: transparent;
        color: #e3342b;
        transform: translate(-50%, -100%);
        padding: 0;
      }
      .model-pin.review { color: #f6b915; }
      .model-pin b {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 3px solid #111;
        border-radius: 999px 999px 999px 0;
        background: currentColor;
        transform: rotate(-45deg);
        box-shadow: 0 2px 7px rgba(0,0,0,.24);
      }
      .model-pin b::after {
        content: "";
        width: 10px;
        height: 10px;
        border: 3px solid #111;
        border-radius: 999px;
        background: #fff;
      }
      .model-pin span {
        display: block;
        min-width: 48px;
        margin-top: -3px;
        border: 2px solid currentColor;
        background: #fff;
        color: #202020;
        padding: 2px 5px;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }
      .floor-key {
        right: 18px;
        bottom: 176px;
        display: grid;
        gap: 10px;
        width: 190px;
        background: rgba(255,255,255,.94);
        padding: 16px;
        box-shadow: 0 10px 26px rgba(35,43,52,.12);
      }
      .floor-key strong { font-size: 14px; }
      .floor-key span {
        display: flex;
        gap: 10px;
        align-items: center;
        font-size: 13px;
      }
      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: #e3342b;
      }
      .dot.review { background: #f6b915; }
      .dot.resolved { background: #1b9b3a; }
      .mini-map-card {
        right: 18px;
        bottom: 18px;
        width: 250px;
        aspect-ratio: 1.55;
        border: 1px solid #dce2e5;
        background: #fff;
        box-shadow: 0 10px 26px rgba(35,43,52,.14);
      }
      .mini-map-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .spatial-bottom {
        display: grid;
        grid-template-columns: minmax(260px, .42fr) minmax(200px, .28fr) minmax(260px, .3fr);
        border-top: 1px solid var(--line);
      }
      .spatial-bottom > section {
        min-width: 0;
        padding: 18px 20px;
        border-right: 1px solid var(--line);
      }
      .spatial-bottom > section:last-child { border-right: 0; }
      .panel-head {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        font-weight: 800;
      }
      .panel-head span { color: #0b70df; }
      .thumb-row,
      .doc-row {
        display: grid;
        gap: 12px;
      }
      .thumb-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .doc-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .thumb img,
      .doc img {
        width: 100%;
        height: 96px;
        object-fit: cover;
        border: 1px solid #e2e7ea;
      }
      .doc img {
        height: 104px;
        object-fit: contain;
      }
      .thumb small,
      .doc small {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .summary-grid div {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px;
        border-top: 1px solid var(--line);
        padding: 8px 0;
        font-size: 13px;
      }
      .summary-grid span {
        color: var(--muted);
        font-weight: 800;
      }
      @media (max-width: 900px) {
        .shell { display: block; }
        .side { display: none; }
        .workbench { padding: 18px 14px 92px; }
        .top { display: block; }
        h1 { font-size: 32px; }
        .top-actions { justify-content: flex-start; margin-top: 14px; }
        .project-strip { grid-template-columns: 1fr; }
        .project-select { grid-template-columns: 1fr; }
        .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .kpi:nth-child(2) { border-right: 0; }
        .grid, .two-col, .plan-review { grid-template-columns: 1fr; }
        #panelIssues .grid > section:first-child {
          order: 2;
          max-height: 520px;
          border-top: 1px solid var(--line);
          border-right: 0;
        }
        #inspector { order: 1; }
        .model-stage { min-height: 470px; }
        .model-toolbar { left: 10px; right: 10px; overflow-x: auto; }
        .model-toolbar button { flex: 0 0 42px; width: 42px; min-height: 42px; }
        .view-toggle { right: 10px; top: 66px; }
        .model-image { width: 720px; max-width: none; transform: translate(-50%, -46%); }
        .model-pin { transform: translate(-50%, -92%) scale(.82); transform-origin: center bottom; }
        .floor-key { left: 10px; right: auto; bottom: 120px; width: 142px; padding: 12px; }
        .mini-map-card { right: 10px; bottom: 12px; width: 142px; }
        .spatial-bottom { grid-template-columns: 1fr; }
        .spatial-bottom > section { border-right: 0; border-top: 1px solid var(--line); }
        .thumb-row { grid-template-columns: 1fr; }
        .detail { grid-template-columns: 1fr; }
        .detail div { border-right: 0; border-bottom: 1px solid var(--line); }
        .evidence-block { grid-template-columns: 1fr; gap: 8px; }
        .recognition-list, .evidence-links, .asset-list, .report-preview, .tech, .pipeline-steps, .pipeline-events {
          grid-template-columns: 1fr;
        }
        .plan-toolbar {
          align-items: flex-start;
        }
        .plan-summary {
          grid-template-columns: 1fr;
        }
        .sheet-list div,
        .region-list div {
          grid-template-columns: 1fr;
        }
        .bottom {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 30;
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          background: #fff;
          border-top: 1px solid var(--line);
        }
        .bottom button {
          border: 0;
          border-top: 3px solid transparent;
          min-height: 58px;
          font-size: 12px;
          padding: 6px 4px;
        }
        .bottom .active {
          border-top-color: var(--signal);
          color: var(--ink);
          font-weight: 800;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="side">
        <button class="brand" data-view="issues"><img src="/buili_favicon_transparent.png" alt="" /><span>Buili</span></button>
        <nav class="nav">
          <button class="active" data-view="issues">Issues</button>
          <button data-view="evidence">Evidence</button>
          <button data-view="plan">Plan</button>
          <button data-view="reports">Reports</button>
          <button data-view="pipeline">Pipeline</button>
        </nav>
      </aside>
      <section class="workbench">
        <header class="top">
          <div>
            <p class="eyebrow">Field to report</p>
            <h1>Buili</h1>
            <p class="subtle">Issue inbox, evidence chain, RFI, punch list, and CO support.</p>
          </div>
          <div class="top-actions">
            <button id="installBtn">Install</button>
            <button class="primary" id="runBtn">Run review</button>
          </div>
        </header>
        <section class="project-strip">
          <div class="project-select">
            <label for="projectSelect">Project</label>
            <select id="projectSelect"></select>
          </div>
          <input id="newName" placeholder="New project name" />
          <input id="newAddress" placeholder="Address" />
          <button id="addProjectBtn">Add</button>
          <button id="uploadBtn">Upload</button>
          <input id="fileInput" class="hidden" type="file" accept=".pdf,.docx,.txt,.csv,.xlsx,image/*,video/*,audio/*" />
        </section>
        <p class="notice" id="notice"></p>
        <section class="kpis">
          <div class="kpi"><span>Issues ready</span><strong id="kpiIssues">0</strong></div>
          <div class="kpi"><span>Action needed</span><strong id="kpiAction">0</strong></div>
          <div class="kpi"><span>Evidence score</span><strong id="kpiEvidence">0%</strong></div>
          <div class="kpi"><span>Job</span><strong id="kpiJob">idle</strong></div>
        </section>

        <section id="panelIssues" class="panel active">
          <div class="grid">
            <section>
              <div class="section-row"><h2>Issue inbox</h2><span id="shownCount">0 shown</span></div>
              <div class="tabs">
                <button class="active" data-filter="all">All <span id="countAll">0</span></button>
                <button data-filter="blocker">Blocker <span id="countBlocker">0</span></button>
                <button data-filter="electrical">Elec <span id="countElec">0</span></button>
                <button data-filter="mechanical">Mech <span id="countMech">0</span></button>
              </div>
              <div id="issueList"></div>
            </section>
            <section id="inspector"></section>
            <aside>
              <div class="section-row"><h2>Plan trace</h2><span id="pinCount">0 pins</span></div>
              <div class="plan-box"><img src="/plans/utah-e11-electrical-plan.jpg" alt="E1.1 electrical plan" /></div>
              <div class="snapshot" id="snapshot"></div>
            </aside>
          </div>
        </section>

        <section id="panelEvidence" class="panel">
          <div class="two-col">
            <section>
              <div class="section-row"><h2>Evidence</h2><span id="assetCount">0 docs · 0 media</span></div>
              <div class="field-stage"><img src="/site-media/construction-site-electrical-work.jpg" alt="Field electrical work" /><span class="marker"></span></div>
              <div class="recognition-list" id="recognitions"></div>
              <div class="evidence-links" id="evidenceLinks"></div>
              <div class="asset-list" id="assets"></div>
            </section>
            <section>
              <div class="section-row"><h2>Citations</h2><button id="searchBtn">Search</button></div>
              <textarea id="ragQuery">AFCI GFCI smoke detector outlet electrical plan</textarea>
              <div class="rag-results" id="ragResults"></div>
            </section>
          </div>
        </section>

        <section id="panelPlan" class="panel">
          <div class="section-row"><h2>Drawing overlay</h2><span id="overlayCount">0 issue pins</span></div>
          <div class="plan-toolbar">
            <div>
              <button data-zoom="out" title="Zoom out">-</button>
              <button data-zoom="fit" title="Fit drawing">Fit</button>
              <button data-zoom="in" title="Zoom in">+</button>
              <span class="zoom-readout" id="zoomReadout">100%</span>
            </div>
            <span class="subtle" id="planSource">E1.1 electrical plan</span>
          </div>
          <div class="plan-review">
            <div class="plan-viewport">
              <div class="plan-canvas" id="planCanvas">
                <img src="/plans/utah-e11-electrical-plan.jpg" alt="E1.1 electrical plan" />
              </div>
            </div>
            <aside class="plan-sidebar">
              <div class="plan-summary" id="planSummary"></div>
              <section class="sheet-list" id="sheetList"></section>
              <section class="pin-list" id="pinList"></section>
              <section class="region-list" id="regionList"></section>
              <section class="trace-detail" id="planTraceDetail"></section>
            </aside>
          </div>
        </section>

        <section id="panelReports" class="panel">
          <div class="report-preview" id="reportPreview"></div>
          <div class="report-actions">
            <button class="primary" data-report="punch:pdf">Punch PDF</button>
            <button data-report="punch:csv">Punch CSV</button>
            <button data-report="co_evidence:pdf">CO Evidence</button>
            <button data-report="co_evidence:xlsx">CO XLSX</button>
            <button data-report="rfi:md">RFI MD</button>
            <button data-report="rfi:pdf">RFI PDF</button>
          </div>
          <p id="reportLink"></p>
          <textarea class="rfi-output" id="rfiOutput" readonly></textarea>
        </section>

        <section id="panelPipeline" class="panel">
          <div class="section-row"><h2>Pipeline</h2><span>/api</span></div>
          <div class="pipeline-steps" id="steps"></div>
          <div class="tech" id="tech"></div>
          <div class="pipeline-events" id="jobLog"></div>
        </section>
      </section>
      <nav class="bottom">
        <button class="active" data-view="issues">Issues</button>
        <button data-view="evidence">Evidence</button>
        <button data-view="plan">Plan</button>
        <button data-view="reports">Reports</button>
        <button data-view="pipeline">Pipeline</button>
      </nav>
    </main>

    <script>
      const API = "/api";
      const state = {
        view: "issues",
        filter: "all",
        projects: [],
        project: null,
        issues: [],
        overlay: null,
        documents: [],
        media: [],
        observations: [],
        tech: [],
        job: null,
        selectedId: "",
        planZoom: 1,
        deferredPrompt: null,
        autoRan: new Set()
      };
      const demoIssues = [
        {
          issue_id: "demo-a32-door",
          type: "dimension_mismatch",
          discipline: "architectural",
          severity: "blocker",
          room: "Room 101",
          status: "review_ready",
          confidence: .81,
          title: "A3.2 Door Width",
          description: "Actual 810mm door opening is below the 910mm plan requirement.",
          recommended_action: "Confirm framed opening width before drywall close-in.",
          assignee: "GC",
          due_date: "2026-07-01",
          requirement: { source: "A-101", text: "Door opening required at 910mm clear width." },
          observation: { media_id: "field-photo-03", text: "Measured field opening reads 810mm." },
          plan_location: { sheet_id: "A-101" },
          evidence: [{}]
        },
        {
          issue_id: "demo-e11-afci",
          type: "coverage_check",
          discipline: "electrical",
          severity: "major",
          room: "Corridor A",
          status: "review_ready",
          confidence: .88,
          title: "E1.1 AFCI Outlet",
          description: "Low wall outlet not installed at the E1.1 corridor location.",
          recommended_action: "Install AFCI outlet per E1.1 plan specification before rough-in approval.",
          assignee: "Electrical Sub",
          due_date: "2026-07-02",
          requirement: { source: "E1.1", text: "Electrical notes require AFCI protected outlets." },
          observation: { media_id: "field-photo-01", text: "Field image and 3D alignment show missing outlet." },
          plan_location: { sheet_id: "A-101" },
          evidence: [{}, {}, {}]
        },
        {
          issue_id: "demo-m24-diffuser",
          type: "location_mismatch",
          discipline: "mechanical",
          severity: "major",
          room: "Office 204",
          status: "needs_more_evidence",
          confidence: .76,
          title: "M2.4 Supply Diffuser",
          description: "Diffuser location mismatch against M2.4 ceiling coordination note.",
          recommended_action: "Verify diffuser location against reflected ceiling plan and capture correction evidence.",
          assignee: "Mechanical Sub",
          due_date: "2026-07-03",
          requirement: { source: "M-201", text: "Supply diffuser to align with ceiling grid." },
          observation: { media_id: "field-photo-02", text: "3D overlay places diffuser outside expected bay." },
          plan_location: { sheet_id: "M-201" },
          evidence: [{}]
        },
        {
          issue_id: "demo-p13-pipe",
          type: "clearance_check",
          discipline: "mechanical",
          severity: "minor",
          room: "Mechanical Room",
          status: "needs_more_evidence",
          confidence: .69,
          title: "P1.3 Pipe Clearance",
          description: "Pipe clearance appears less than 25mm at the utility wall.",
          recommended_action: "Capture one additional field photo with tape reference.",
          assignee: "Field PM",
          due_date: "2026-07-05",
          requirement: { source: "P-101", text: "Maintain minimum service clearance at utility wall." },
          observation: { media_id: "field-photo-04", text: "Spatial candidate needs PM verification." },
          plan_location: { sheet_id: "P-101" },
          evidence: [{}]
        }
      ];
      const $ = (id) => document.getElementById(id);
      const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      const pct = (value) => Math.round(Number(value || 0) * 100);
      const avg = (items) => items.length ? items.reduce((sum, issue) => sum + Number(issue.confidence || 0), 0) / items.length : 0;
      async function request(path, options = {}) {
        const init = { ...options, headers: { ...(options.headers || {}) } };
        if (init.body && !(init.body instanceof FormData)) {
          init.headers["Content-Type"] = "application/json";
        }
        const response = await fetch(`${API}${path}`, init);
        if (!response.ok) throw new Error(`${response.status} ${await response.text()}`);
        const type = response.headers.get("content-type") || "";
        return type.includes("application/json") ? response.json() : response.text();
      }
      function notice(text) { $("notice").textContent = text || ""; }
      function selectedIssue() {
        return state.issues.find((issue) => issue.issue_id === state.selectedId) || state.issues[0] || null;
      }
      async function loadProjects() {
        state.projects = await request("/v1/projects");
        state.project = state.projects.find((item) => item.name.includes("Cooper")) || state.projects[0] || null;
        renderProjectSelect();
        if (state.project) await loadProject(state.project.project_id);
      }
      async function loadProject(projectId) {
        const [issues, overlay, job, documents, media, observations, tech] = await Promise.all([
          request(`/v1/projects/${projectId}/issues`),
          request(`/v1/projects/${projectId}/plan-overlay`),
          request(`/v1/projects/${projectId}/jobs/latest`).catch(() => null),
          request(`/v1/projects/${projectId}/documents`),
          request(`/v1/projects/${projectId}/media`),
          request(`/v1/projects/${projectId}/observations`),
          request(`/v1/projects/${projectId}/technology-status`)
        ]);
        state.issues = issues.length ? issues : demoIssues;
        state.overlay = overlay;
        state.job = job;
        state.documents = documents;
        state.media = media;
        state.observations = observations;
        state.tech = tech;
        if (!state.issues.some((issue) => issue.issue_id === state.selectedId)) {
          state.selectedId = state.issues[0]?.issue_id || "";
        }
        render();
        if (!issues.length && state.documents.length && !state.autoRan.has(projectId)) {
          state.autoRan.add(projectId);
          await runReview("Preparing the first review run...");
        }
      }
      function renderProjectSelect() {
        $("projectSelect").innerHTML = state.projects.map((project) => `<option value="${esc(project.project_id)}">${esc(project.name)}</option>`).join("");
        if (state.project) $("projectSelect").value = state.project.project_id;
      }
      function render() {
        const issue = selectedIssue();
        $("kpiIssues").textContent = state.issues.filter((item) => item.status === "review_ready").length;
        $("kpiAction").textContent = state.issues.filter((item) => item.status === "review_ready" && Number(item.confidence) >= .55).length;
        $("kpiEvidence").textContent = `${pct(avg(state.issues))}%`;
        $("kpiJob").textContent = state.job ? `${state.job.progress}%` : "idle";
        $("shownCount").textContent = `${filteredIssues().length} shown`;
        $("countAll").textContent = state.issues.length;
        $("countBlocker").textContent = state.issues.filter((item) => item.severity === "blocker").length;
        $("countElec").textContent = state.issues.filter((item) => item.discipline === "electrical").length;
        $("countMech").textContent = state.issues.filter((item) => item.discipline === "mechanical").length;
        renderIssues();
        renderInspector(issue);
        renderSnapshot(issue);
        renderEvidence(issue);
        renderPlan();
        renderReports(issue);
        renderPipeline();
      }
      function filteredIssues() {
        return state.issues.filter((issue) => {
          if (state.filter === "all") return true;
          if (state.filter === "blocker") return issue.severity === "blocker";
          return issue.discipline === state.filter;
        });
      }
      function renderIssues() {
        const groups = [
          ["blocker", "Blocker - Needs Review"],
          ["major", "Major - Awaiting Verification"],
          ["minor", "Minor - Informational"],
          ["informational", "Informational"]
        ];
        $("issueList").innerHTML = groups.map(([severity, label]) => {
          const items = filteredIssues().filter((issue) => issue.severity === severity);
          if (!items.length) return "";
          return `<section class="issue-group"><p class="group-label">${label}</p>${items.map((issue) => `
            <button class="issue-row ${esc(issue.severity)} ${issue.issue_id === state.selectedId ? "selected" : ""}" data-issue="${esc(issue.issue_id)}">
              <span>
                <span class="issue-type">${esc(issue.type).replaceAll("_", " ")} · ${esc(issue.discipline)}</span>
                <strong>${esc(issue.title)}</strong>
                <small>${esc(issue.room)} · ${esc(issue.requirement?.source || "source pending")}</small>
              </span>
              <span class="confidence">${pct(issue.confidence)}%</span>
            </button>`).join("")}</section>`;
        }).join("") || `<p class="subtle">No issue candidates yet. Run review to generate the first inbox.</p>`;
      }
      function renderInspector(issue) {
        const active = issue || {
          issue_id: "demo-e11-afci",
          title: "AFCI Outlet",
          room: "Corridor A",
          status: "review_ready",
          confidence: .88,
          assignee: "Electrical Sub",
          due_date: "2026-07-02",
          recommended_action: "Install AFCI outlet per E1.1 plan specification before rough-in approval.",
          plan_location: { sheet_id: "A-101" },
          evidence: [{}, {}, {}]
        };
        const pins = [
          { code: "E1.1", tone: "open", x: 52, y: 32 },
          { code: "M2.4", tone: "review", x: 67, y: 48 },
          { code: "A3.2", tone: "open", x: 39, y: 62 },
          { code: "P1.3", tone: "review", x: 23, y: 74 }
        ];
        $("inspector").innerHTML = `
          <article class="spatial-workspace">
            <div class="model-stage">
              <div class="model-toolbar" aria-label="3D tools">
                <button class="active" title="Select">↖</button>
                <button title="Pan">✋</button>
                <button title="Rotate">↻</button>
                <button title="Fit">⛶</button>
                <button title="Model">□</button>
                <button title="Grid">▦</button>
                <button title="Measure">⌁</button>
              </div>
              <div class="view-toggle"><button>2D Plan</button><button class="active">3D Model</button></div>
              <img class="model-image" src="/plan2field3d/auto_plan2field3d.png" alt="Buili Plan2Field 3D model" />
              ${pins.map((pin) => `
                <button class="model-pin ${pin.tone === "review" ? "review" : ""}" style="left:${16 + pin.x * .68}%;top:${16 + pin.y * .62}%">
                  <b></b><span>${pin.code}</span>
                </button>`).join("")}
              <div class="floor-key">
                <strong>Floor Plan Key</strong>
                <span><i class="dot"></i>Open</span>
                <span><i class="dot review"></i>In Review</span>
                <span><i class="dot resolved"></i>Resolved</span>
              </div>
              <div class="mini-map-card"><img src="/plan2field3d/auto_plan_crop.png" alt="2D plan minimap" /></div>
            </div>
            <div class="spatial-bottom">
              <section>
                <div class="panel-head"><strong>Field Evidence</strong><span>(${Math.max(state.media.length, active.evidence?.length || 0)})</span></div>
                <div class="thumb-row">
                  <figure class="thumb"><img src="/site-media/construction-site-electrical-work.jpg" alt="Outlet close-up" /><small>Outlet close-up</small></figure>
                  <figure class="thumb"><img src="/plans/utah-e11-electrical-plan.jpg" alt="Marked plan area" /><small>Marked plan area</small></figure>
                  <figure class="thumb"><img src="/plan2field3d/auto_plan2field3d.png" alt="3D spatial view" /><small>3D spatial view</small></figure>
                </div>
              </section>
              <section>
                <div class="panel-head"><strong>Documents</strong><span>(${Math.max(state.documents.length, 2)})</span></div>
                <div class="doc-row">
                  <figure class="doc"><img src="/plan2field3d/auto_plan_crop.png" alt="A-101.pdf" /><small>${esc(active.plan_location?.sheet_id || "A-101")}.pdf</small></figure>
                  <figure class="doc"><img src="/plans/utah-e11-electrical-plan.jpg" alt="Spec electrical" /><small>Spec_Electrical.pdf</small></figure>
                </div>
              </section>
              <section>
                <div class="panel-head"><strong>Issue Summary</strong></div>
                <div class="summary-grid">
                  <div><span>Confidence</span><strong>${pct(active.confidence)}%</strong></div>
                  <div><span>Action</span><strong>${esc(active.recommended_action || "Verify against plan.")}</strong></div>
                  <div><span>Assignee</span><strong>${esc(active.assignee || "Field PM")}</strong></div>
                  <div><span>Due Date</span><strong>${esc(active.due_date || "Open")}</strong></div>
                </div>
                <div class="actions">
                  <button class="approve" data-status="approved">Approve</button>
                  <button data-status="needs_more_evidence">More</button>
                  <button id="rfiBtn">RFI</button>
                  <button class="reject" data-status="rejected_false_positive">Reject</button>
                </div>
              </section>
            </div>
          </article>`;
      }
      function evidenceBlock(title, text, source) {
        return `<section class="evidence-block"><span>${esc(title)}</span><div><p>${esc(text || "")}</p><small>${esc(source || "")}</small></div></section>`;
      }
      function renderSnapshot(issue) {
        const pins = state.overlay?.pins || [];
        $("pinCount").textContent = `${pins.length} pins`;
        $("snapshot").innerHTML = `
          <div><span>Sheet</span><strong>${esc(issue?.plan_location?.sheet_id || "E1.1")}</strong></div>
          <div><span>Location</span><strong>${esc(issue?.room || "pending")}</strong></div>
          <div><span>Evidence</span><strong>${issue?.evidence?.length || 0} links</strong></div>`;
      }
      function renderEvidence(issue) {
        $("assetCount").textContent = `${state.documents.length} docs · ${state.media.length} media`;
        const observations = state.observations.length ? state.observations : (issue?.evidence || []).map((item, index) => ({
          observation_id: `${item.evidence_id}_${index}`,
          object_type: issue.type,
          text: issue.observation?.text || "Field verification pending.",
          media_id: issue.observation?.media_id || "pending",
          confidence: issue.confidence
        }));
        $("recognitions").innerHTML = observations.slice(0, 5).map((item) => `
          <article><strong>${esc(item.object_type).replaceAll("_", " ")}</strong><p>${esc(item.text)}</p><small>media ${esc(item.media_id)} · confidence ${pct(item.confidence)}%</small></article>
        `).join("");
        $("evidenceLinks").innerHTML = (issue?.evidence || []).slice(0, 6).map((item) => `
          <div><span>${esc(item.evidence_type).replaceAll("_", " ")}</span><strong>${esc(item.label || item.ref_id)}</strong><small>${esc(item.r2_key)} · page ${esc(item.page || "-")}</small></div>
        `).join("");
        $("assets").innerHTML = [
          ...state.documents.slice(0, 3).map((item) => `<div><span>${esc(item.type)}</span><strong>${esc(item.filename)}</strong><small>${esc(item.parsed_status)} · rev ${esc(item.revision)}</small></div>`),
          ...state.media.slice(0, 3).map((item) => `<div><span>media</span><strong>${esc(item.filename)}</strong><small>${esc(item.mime)}</small></div>`)
        ].join("");
      }
      function renderPlan() {
        const pins = state.overlay?.pins || [];
        const sheets = state.overlay?.sheets || [];
        const regions = state.overlay?.regions || [];
        const issue = selectedIssue();
        const activePin = pins.find((pin) => pin.id === issue?.issue_id) || pins[0] || null;
        const activeSheetNumber = issue?.plan_location?.sheet_id || activePin?.sheet_id || "E1.1";
        const orderedSheets = [...sheets].sort((a, b) => {
          const aActive = a.sheet_number === activeSheetNumber ? 0 : 1;
          const bActive = b.sheet_number === activeSheetNumber ? 0 : 1;
          if (aActive !== bActive) return aActive - bActive;
          const aElec = a.discipline === "electrical" ? 0 : 1;
          const bElec = b.discipline === "electrical" ? 0 : 1;
          if (aElec !== bElec) return aElec - bElec;
          return String(a.sheet_number).localeCompare(String(b.sheet_number));
        });
        const activeSheet = orderedSheets.find((sheet) => sheet.sheet_number === activeSheetNumber) || orderedSheets[0];
        $("overlayCount").textContent = `${pins.length} issue pins`;
        $("zoomReadout").textContent = `${Math.round(state.planZoom * 100)}%`;
        $("planSource").textContent = activeSheet ? `${activeSheet.sheet_number} · ${activeSheet.title}` : "E1.1 electrical plan";
        $("planSummary").innerHTML = `
          <div><span>Sheets</span><strong>${sheets.length}</strong></div>
          <div><span>Plan entities</span><strong>${regions.length}</strong></div>
          <div><span>Issue pins</span><strong>${pins.length}</strong></div>`;
        $("sheetList").innerHTML = `<span>Sheets</span>${orderedSheets.map((sheet) => `
          <div><strong>${esc(sheet.sheet_number)}</strong><p>${esc(sheet.title || sheet.discipline)}</p><small>${esc(sheet.discipline)} · page ${esc(sheet.page_no)}</small></div>
        `).join("") || `<p class="subtle">No parsed sheets yet.</p>`}`;
        $("pinList").innerHTML = `<span>Issue pins</span>${pins.map((pin, index) => `
          <button class="${esc(pin.severity)} ${pin.id === issue?.issue_id ? "active" : ""}" data-issue="${esc(pin.id)}">
            <strong>${index + 1}. ${esc(pin.label)}</strong><small>${esc(pin.room)} · ${pct(pin.confidence)}%</small>
          </button>
        `).join("") || `<p class="subtle">No plan pins yet.</p>`}`;
        $("regionList").innerHTML = `<span>Detected plan entities</span>${regions.slice(0, 10).map((region) => `
          <div><strong>${esc(region.type).replaceAll("_", " ")}</strong><p>${esc(region.room || "room pending")}</p><small>${pct(region.confidence)}%</small></div>
        `).join("") || `<p class="subtle">No extracted plan entities yet.</p>`}`;
        $("planTraceDetail").innerHTML = issue ? `
          <span>Selected trace</span>
          <h3>${esc(issue.title)}</h3>
          <p>${esc(issue.requirement?.text || "")}</p>
          <p>${esc(issue.observation?.text || "")}</p>
          <small>${esc(activePin?.room || issue.room)} · ${esc(issue.plan_location?.sheet_id || "sheet pending")}</small>
        ` : `<span>Selected trace</span><p class="subtle">Select a pin or issue to inspect the trace.</p>`;
        $("planCanvas").querySelectorAll(".pin").forEach((node) => node.remove());
        $("planCanvas").style.width = `${Math.round(state.planZoom * 100)}%`;
        for (const pin of pins) {
          const el = document.createElement("button");
          el.type = "button";
          el.dataset.issue = pin.id;
          el.className = `pin ${pin.severity} ${pin.id === issue?.issue_id ? "active" : ""}`;
          el.style.left = `${pin.x * 100}%`;
          el.style.top = `${pin.y * 100}%`;
          el.title = `${pin.label} ${pin.room}`;
          el.setAttribute("aria-label", `${pin.label} ${pin.room}`);
          $("planCanvas").appendChild(el);
        }
      }
      function renderReports(issue) {
        $("reportPreview").innerHTML = `
          <article><span>${state.issues.length} issue rows</span><strong>Punch list</strong><p>${esc(state.issues.slice(0, 3).map((item) => item.title).join(" · "))}</p></article>
          <article><span>${esc(issue?.room || "No issue")}</span><strong>RFI draft</strong><p>${esc(issue?.rfi_draft || "Select an issue to preview the RFI question.")}</p></article>
          <article><span>${state.documents.length} docs · ${state.media.length} media</span><strong>Change order evidence</strong><p>Requirement, observation, plan pin, citation, and field media evidence are bundled for review.</p></article>`;
        $("rfiOutput").value = issue ? buildRfi(issue) : "";
      }
      function renderPipeline() {
        const states = ["queued", "ingesting", "indexing", "extracting frames", "detecting", "reasoning", "review ready"];
        $("steps").innerHTML = states.map((item, index) => `<div><span>${index + 1}</span><strong>${item}</strong></div>`).join("");
        $("tech").innerHTML = state.tech.map((item) => `
          <article class="${item.status === "ready" ? "ready" : ""}"><span>${esc(item.status).replaceAll("_", " ")}</span><strong>${esc(item.label)}</strong><p>${esc(item.summary)}</p><small>${item.evidence_count} evidence records</small></article>
        `).join("");
        const events = (state.job?.events || []).slice(-6);
        $("jobLog").innerHTML = events.length ? events.map((event) => `
          <div><span>${esc(event.state || "event")}</span><strong>${esc(event.event || "pipeline")}</strong><p>${esc(event.progress || 0)}% complete</p></div>
        `).join("") : `<div><span>idle</span><strong>No run yet</strong><p>Run review to start the analysis pipeline.</p></div>`;
      }
      function buildRfi(issue) {
        return [`# RFI Draft: ${issue.title}`, "", `Location: ${issue.room}`, "", `Contract requirement: ${issue.requirement?.text || ""}`, "", `Field observation: ${issue.observation?.text || ""}`, "", `Question: ${issue.rfi_draft || ""}`, "", "PM review required before sending."].join("\n");
      }
      async function runReview(message = "Review run queued. Pipeline progress will update automatically.") {
        if (!state.project) return;
        notice(message);
        state.job = await request(`/v1/projects/${state.project.project_id}/analyze`, { method: "POST", body: JSON.stringify({ priority: "normal", force: true }) });
        render();
        await pollJob(state.job.job_id);
      }
      async function pollJob(jobId) {
        for (let i = 0; i < 10; i++) {
          await new Promise((resolve) => setTimeout(resolve, 900));
          state.job = await request(`/v1/jobs/${jobId}`);
          render();
          if (["review_ready", "failed"].includes(state.job.state)) break;
        }
        if (state.project) await loadProject(state.project.project_id);
        notice(state.job?.state === "failed" ? state.job.error : "Review complete. Issue candidates were refreshed.");
      }
      async function setIssueStatus(status) {
        const issue = selectedIssue();
        if (!issue) return;
        if (String(issue.issue_id).startsWith("demo-")) {
          issue.status = status;
          notice(`Demo issue marked as ${status.replaceAll("_", " ")}.`);
          render();
          return;
        }
        const updated = await request(`/v1/issues/${issue.issue_id}`, { method: "PATCH", body: JSON.stringify({ status }) });
        state.issues = state.issues.map((item) => item.issue_id === updated.issue_id ? updated : item);
        notice(`Issue marked as ${status.replaceAll("_", " ")}.`);
        render();
      }
      async function createProject() {
        const name = $("newName").value.trim();
        if (!name) return;
        state.project = await request("/v1/projects", { method: "POST", body: JSON.stringify({ name, address: $("newAddress").value, project_type: "tenant_improvement" }) });
        await loadProjects();
        $("projectSelect").value = state.project.project_id;
        $("newName").value = "";
        $("newAddress").value = "";
      }
      async function uploadFile(file) {
        if (!file || !state.project) return;
        const kind = file.type.startsWith("image/") || file.type.startsWith("video/") || file.type.startsWith("audio/") ? "media" : "document";
        const presign = await request("/v1/uploads/presign", { method: "POST", body: JSON.stringify({ project_id: state.project.project_id, filename: file.name, mime: file.type || "application/octet-stream", size: file.size, kind }) });
        const form = new FormData();
        form.append("file", file);
        const upload = await fetch(presign.upload_url, { method: "POST", body: form });
        if (!upload.ok) throw new Error(await upload.text());
        await fetch(presign.complete_url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ document_type: kind === "media" ? "media" : "plan", revision: "A" }) });
        notice(`${file.name} uploaded. Run review to refresh issue candidates.`);
        await loadProject(state.project.project_id);
      }
      async function searchRag() {
        if (!state.project) return;
        const result = await request(`/v1/projects/${state.project.project_id}/rag/search?q=${encodeURIComponent($("ragQuery").value)}`);
        const citations = result.citations || [];
        $("ragResults").innerHTML = `
          <article><strong>Answer</strong><p>${esc(result.answer || "No answer available.")}</p><small>${citations.length} citations</small></article>
          ${citations.map((item) => `<article><strong>${esc(item.sheet || item.chunk_id || "citation")}</strong><p>${esc(String(item.excerpt || "").slice(0, 280))}</p><small>score ${esc(item.score || "n/a")} · page ${esc(item.page || "-")} · rev ${esc(item.revision || "-")}</small></article>`).join("")}
        `;
        notice(`Found ${citations.length || result.returned_context.length} citation candidates.`);
      }
      async function generateReport(kind, format) {
        if (!state.project) return;
        const report = await request(`/v1/projects/${state.project.project_id}/reports`, { method: "POST", body: JSON.stringify({ report_type: kind, format }) });
        $("reportLink").innerHTML = `<a href="${esc(report.download_url)}" target="_blank" rel="noreferrer">Download generated report</a>`;
        notice(`${kind.replaceAll("_", " ")} ${format.toUpperCase()} report generated.`);
      }
      function switchView(view) {
        state.view = view;
        document.querySelectorAll(".panel").forEach((item) => item.classList.remove("active"));
        $(`panel${view[0].toUpperCase()}${view.slice(1)}`).classList.add("active");
        document.querySelectorAll("[data-view]").forEach((item) => item.classList.toggle("active", item.dataset.view === view));
      }
      document.addEventListener("click", async (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.view) switchView(target.dataset.view);
        if (target.dataset.filter) {
          state.filter = target.dataset.filter;
          document.querySelectorAll("[data-filter]").forEach((item) => item.classList.toggle("active", item.dataset.filter === state.filter));
          render();
        }
        if (target.dataset.issue) { state.selectedId = target.dataset.issue; render(); }
        if (target.dataset.status) await setIssueStatus(target.dataset.status);
        if (target.dataset.zoom) {
          if (target.dataset.zoom === "fit") state.planZoom = 1;
          if (target.dataset.zoom === "in") state.planZoom = Math.min(2.2, state.planZoom + 0.2);
          if (target.dataset.zoom === "out") state.planZoom = Math.max(0.7, state.planZoom - 0.2);
          renderPlan();
        }
        if (target.dataset.report) {
          const [kind, format] = target.dataset.report.split(":");
          await generateReport(kind, format);
        }
      });
      $("projectSelect").addEventListener("change", async (event) => {
        state.project = state.projects.find((item) => item.project_id === event.target.value);
        await loadProject(state.project.project_id);
      });
      $("runBtn").addEventListener("click", () => runReview());
      $("addProjectBtn").addEventListener("click", createProject);
      $("uploadBtn").addEventListener("click", () => $("fileInput").click());
      $("fileInput").addEventListener("change", (event) => uploadFile(event.target.files[0]));
      $("searchBtn").addEventListener("click", searchRag);
      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        state.deferredPrompt = event;
      });
      $("installBtn").addEventListener("click", async () => {
        if (!state.deferredPrompt) {
          notice("Use the browser install option to add Buili to your home screen.");
          return;
        }
        state.deferredPrompt.prompt();
        state.deferredPrompt = null;
      });
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
      loadProjects().catch((error) => notice(`Load failed: ${error.message}`));
    </script>
  </body>
</html>
